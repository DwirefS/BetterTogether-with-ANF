# -------------------------------------------------------------------------------------
# Azure Key Vault Provider for Secrets Store CSI Driver
# -------------------------------------------------------------------------------------
# Mounts Azure Key Vault secrets directly into AKS pods as volumes or environment
# variables, replacing static Kubernetes Secrets with dynamically rotated Key Vault
# secrets. This eliminates the security risk of long-lived credentials in K8s etcd.
#
# How it works:
#   - SecretProviderClass defines WHICH secrets to pull from Key Vault
#   - Pod mounts the SecretProviderClass as a CSI volume
#   - CSI driver fetches secrets at pod startup and rotates them on the poll interval
#   - Secrets are available as files in the mounted volume AND optionally synced
#     to K8s Secrets for use as environment variables (valueFrom.secretKeyRef)
#
# Deployment:
#   This file uses envsubst variables that are populated by scripts/deploy.sh:
#     ${KEY_VAULT_NAME}           — from Bicep output: keyVaultName
#     ${AZURE_TENANT_ID}          — from az account show
#     ${AKS_IDENTITY_CLIENT_ID}   — from AKS managed identity (azureKeyvaultSecretsProvider addon)
#
#   The deploy script runs:
#     envsubst < kubernetes/secrets/keyvault-csi.yaml | kubectl apply -f -
# -------------------------------------------------------------------------------------

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: finserv-ai
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the AKS azureKeyvaultSecretsProvider managed identity.
    # Retrieved by deploy.sh from:
    #   az aks show --name <aks> --resource-group <rg> \
    #     --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
    userAssignedIdentityID: "${AKS_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: NGC-API-KEY
          objectType: secret
          objectAlias: NGC_API_KEY
        - |
          objectName: ANF-S3-ENDPOINT
          objectType: secret
          objectAlias: ANF_OBJECT_REST_ENDPOINT
        - |
          objectName: ANF-S3-ACCESS-KEY
          objectType: secret
          objectAlias: ANF_ACCESS_KEY
        - |
          objectName: ANF-S3-SECRET-KEY
          objectType: secret
          objectAlias: ANF_SECRET_KEY
        - |
          objectName: AZURE-AD-CLIENT-ID
          objectType: secret
          objectAlias: AZURE_AD_CLIENT_ID
        - |
          objectName: AZURE-AD-CLIENT-SECRET
          objectType: secret
          objectAlias: AZURE_AD_CLIENT_SECRET
        - |
          objectName: AZURE-AD-TENANT-ID
          objectType: secret
          objectAlias: AZURE_AD_TENANT_ID

  # Sync Key Vault secrets → Kubernetes Secrets for env var injection.
  # The CSI driver auto-creates these K8s Secrets and rotates them
  # every 2 minutes (configured via --rotation-poll-interval on the addon).
  # Pod specs reference these via valueFrom.secretKeyRef (already configured
  # in kubernetes/base/app-deployment.yaml).
  secretObjects:
    - secretName: ngc-api-key
      type: Opaque
      data:
        - objectName: NGC_API_KEY
          key: NGC_API_KEY

    - secretName: anf-s3-secret
      type: Opaque
      data:
        - objectName: ANF_OBJECT_REST_ENDPOINT
          key: endpoint
        - objectName: ANF_ACCESS_KEY
          key: access_key
        - objectName: ANF_SECRET_KEY
          key: secret_key

    - secretName: azure-ad-secret
      type: Opaque
      data:
        - objectName: AZURE_AD_CLIENT_ID
          key: client_id
        - objectName: AZURE_AD_CLIENT_SECRET
          key: client_secret
        - objectName: AZURE_AD_TENANT_ID
          key: tenant_id
