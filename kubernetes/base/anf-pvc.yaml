# Azure NetApp Files PersistentVolumes & Claims
# ANF NFS IPs and export paths are injected via envsubst from Bicep deployment outputs.
#
# [MOVED] The Namespace definition that was originally here has been extracted to
# kubernetes/base/namespace.yaml so deploy.sh can apply it independently before
# secrets are created. Original block was:
#   apiVersion: v1
#   kind: Namespace
#   metadata:
#     name: finserv-ai
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: anf-data-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: ${ANF_DATA_IP}
    path: /${ANF_DATA_VOL}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anf-data-pvc
  namespace: finserv-ai
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: anf-data-pv
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: anf-milvus-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: ${ANF_MILVUS_IP}
    path: /${ANF_MILVUS_VOL}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anf-milvus-pvc
  namespace: finserv-ai
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: anf-milvus-pv
  resources:
    requests:
      storage: 1Ti
