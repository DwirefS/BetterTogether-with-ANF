#     requests:
#       cpu: "2"
#       memory: "4Gi"
#   image: "milvusdb/milvus:v2.4.0"
#   # [ORIGINAL GPU cuVS config — requires nvidia.com/gpu resource]
#   # extraEnv:
#   #   - name: KNOWHERE_GPU_SEARCH_MODE
#   #     value: "true"
#   #   - name: MILVUS_GPU_ACCELERATION_ENABLED
#   #     value: "true"
#   persistence:
#     enabled: true
#     storageClass: ""
#     existingClaim: "anf-milvus-pvc"

persistence:
  enabled: true
  storageClass: ""
  existingClaim: "anf-milvus-pvc"
