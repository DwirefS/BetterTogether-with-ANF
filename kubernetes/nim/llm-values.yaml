# Values for NVIDIA NIM LLM (Llama 3.1 8B Instruct)
# Chart: nim-llm from https://helm.ngc.nvidia.com/nim/charts/
#
# [ORIGINAL] Used image.pullSecrets and env secretKeyRef for NGC_API_KEY
# Updated to match official nim-llm chart value structure per NVIDIA docs.
# [COST NOTE] Llama 3.1 8B fits on a single T4 16GB with NIM auto-quantization.

image:
  repository: nvcr.io/nim/meta/llama-3.1-8b-instruct
  tag: "1.1.2"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ngc-secret

model:
  ngcAPISecret: ngc-api-key  # generic secret containing NGC_API_KEY

# [ORIGINAL env-based approach — kept as fallback if chart version doesn't support model.ngcAPISecret]
# env:
#   - name: NGC_API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: ngc-api-key
#         key: NGC_API_KEY

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

persistence:
  enabled: true

service:
  type: ClusterIP
  port: 8000
  # Expose metrics port for Prometheus ServiceMonitor scraping.
  # NIM microservices expose /metrics on the same port by default.
  # The ServiceMonitor in kubernetes/monitoring/values-kube-prometheus.yaml
  # scrapes this port for inference latency, tokens/sec, and queue depth.
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

nodeSelector:
  kubernetes.io/os: linux

# Readiness/liveness probes — NIM exposes /v1/health/{ready,live}
readinessProbe:
  httpGet:
    path: /v1/health/ready
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /v1/health/live
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5

# Model download can be slow on first pull (especially on V100 16GB)
# 180 × 10s = 30 min window for initial model download + engine build
startupProbe:
  failureThreshold: 180
  periodSeconds: 10
