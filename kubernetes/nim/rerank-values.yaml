# Values for NVIDIA NIM Text Reranking (NV-RerankQA-Mistral-4B-v3)
# Chart: text-reranking-nim from https://helm.ngc.nvidia.com/nim/nvidia/charts/
#
# [ORIGINAL] Used image.pullSecrets and env secretKeyRef for NGC_API_KEY

image:
  repository: nvcr.io/nim/nvidia/nv-rerankqa-mistral-4b-v3
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ngc-secret

model:
  ngcAPISecret: ngc-api-key

# [ORIGINAL env-based approach]
# env:
#   - name: NGC_API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: ngc-api-key
#         key: NGC_API_KEY

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

persistence:
  enabled: true

service:
  type: ClusterIP
  port: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

readinessProbe:
  httpGet:
    path: /v1/health/ready
    port: 8000
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /v1/health/live
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 5

startupProbe:
  failureThreshold: 60
  periodSeconds: 10
